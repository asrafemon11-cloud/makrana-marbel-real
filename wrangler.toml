# Cloudflare Pages — wrangler.toml
# Used for local development with: npx wrangler pages dev .
#
# Your GEMINI_API_KEY goes in .dev.vars for local dev (never commit that file!)
# For production, set it in the Cloudflare Dashboard environment variables.

name = "makrana-marble"
compatibility_date = "2024-01-01"

[vars]
# Add non-secret vars here (this file IS committed to git)
# SITE_NAME = "Makrana Marble"

# NOTE: Secret vars like GEMINI_API_KEY go in .dev.vars (local only, not committed)
# Create a file called .dev.vars with:
#   GEMINI_API_KEY=your_key_here
